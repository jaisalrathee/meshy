<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Color Namer · meshy.fun</title>
<meta name="description" content="Find the closest named color for any hex value." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script defer src="https://api.pirsch.io/pa.js" id="pianjs" data-code="JNW76zWZEUF0RzRyD9UTUx3sSGtYNuI5"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">What color is that?</div>
      <button class="btn" id="randomBtn">Random</button>
      <button class="btn primary" id="copyBtn">Copy hex</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="namer-stage" id="stage">
        <div>
          <h2 class="big-name" id="name">Cornflower</h2>
          <div class="big-meta"><span id="hexOut">#6BA6FF</span> · <span id="rgbOut">rgb(107, 166, 255)</span> · <span id="hslOut">hsl(216, 100%, 71%)</span></div>
        </div>
      </div>
    </div>
  </main>

  <aside class="sidebar right"></aside>
</div>

<style>
  .canvas { padding: 0; }
  .namer-stage { position: absolute; inset: 0; display: flex; align-items: flex-end; padding: 50px; }
  .big-name { font-family: 'Instrument Serif', serif; font-style: italic; font-size: clamp(48px, 7vw, 96px); line-height: 1; margin: 0 0 12px; letter-spacing: -0.02em; }
  .big-meta { display: flex; gap: 16px; flex-wrap: wrap; font-family: 'SF Mono', monospace; font-size: 12px; opacity: .85; }
  .sim-row { display: flex; gap: 10px; padding: 8px; border-radius: 8px; cursor: pointer; align-items: center; }
  .sim-row:hover { background: var(--line-2); }
  .sim-sw { width: 30px; height: 30px; border-radius: 6px; border: 1px solid rgba(0,0,0,.06); flex-shrink: 0; }
  .sim-meta { flex: 1; }
  .sim-name { font-size: 12.5px; font-weight: 500; color: var(--ink); margin-bottom: 1px; }
  .sim-hex { font-family: 'SF Mono', monospace; font-size: 10.5px; color: var(--ink-3); }
</style>

<script src="/shared.js"></script>
<script>
const NAMED = [
  ['Black','#000000'],['White','#FFFFFF'],['Snow','#FFFAFA'],['Ivory','#FFFFF0'],['Linen','#FAF0E6'],
  ['Bone','#E3DAC9'],['Cream','#FFFDD0'],['Ecru','#C2B280'],['Beige','#F5F5DC'],['Champagne','#F7E7CE'],
  ['Pearl','#EAE0C8'],['Eggshell','#F0EAD6'],['Sand','#C2B280'],['Khaki','#C3B091'],['Camel','#C19A6B'],
  ['Tan','#D2B48C'],['Buff','#DAA06D'],['Wheat','#F5DEB3'],['Vanilla','#F3E5AB'],
  ['Lemon','#FFF44F'],['Banana','#FFE135'],['Mustard','#FFDB58'],['Saffron','#F4C430'],['Gold','#FFD700'],
  ['Amber','#FFBF00'],['Honey','#E6A817'],['Marigold','#EAA221'],['Apricot','#FBCEB1'],['Peach','#FFDAB9'],
  ['Coral','#FF7F50'],['Salmon','#FA8072'],['Melon','#FDBCB4'],['Persimmon','#EC5800'],['Pumpkin','#FF7518'],
  ['Tangerine','#F28500'],['Orange','#FFA500'],['Carrot','#ED9121'],['Rust','#B7410E'],['Brick','#CB4154'],
  ['Tomato','#FF6347'],['Vermillion','#E34234'],['Cinnabar','#E44D2E'],['Scarlet','#FF2400'],['Crimson','#DC143C'],
  ['Cherry','#DE3163'],['Cardinal','#C41E3A'],['Ruby','#E0115F'],['Garnet','#733635'],['Maroon','#800000'],
  ['Wine','#722F37'],['Burgundy','#800020'],['Sangria','#92000A'],['Rose','#FF007F'],['Pink','#FFC0CB'],
  ['Blush','#DE5D83'],['Watermelon','#FC6C85'],['Strawberry','#FC5A8D'],['Raspberry','#E30B5C'],['Hot Pink','#FF69B4'],
  ['Magenta','#FF00FF'],['Mulberry','#770737'],['Plum','#8E4585'],['Orchid','#DA70D6'],
  ['Lavender','#E6E6FA'],['Lilac','#C8A2C8'],['Mauve','#E0B0FF'],['Violet','#8F00FF'],['Indigo','#4B0082'],
  ['Purple','#800080'],['Eggplant','#614051'],['Periwinkle','#CCCCFF'],['Iris','#5A4FCF'],['Ultramarine','#3F00FF'],
  ['Royal Blue','#4169E1'],['Sapphire','#0F52BA'],['Cobalt','#0047AB'],['Navy','#000080'],['Midnight','#191970'],
  ['Denim','#1560BD'],['Cornflower','#6495ED'],['Sky','#87CEEB'],['Azure','#F0FFFF'],['Powder','#B0E0E6'],
  ['Steel','#4682B4'],['Slate','#708090'],['Gunmetal','#2A3439'],['Charcoal','#36454F'],['Graphite','#383428'],
  ['Cyan','#00FFFF'],['Turquoise','#40E0D0'],['Teal','#008080'],['Tiffany','#0ABAB5'],
  ['Mint','#3EB489'],['Seafoam','#9FE2BF'],['Jade','#00A86B'],['Emerald','#50C878'],['Green','#008000'],
  ['Forest','#228B22'],['Pine','#01796F'],['Hunter','#355E3B'],['Olive','#808000'],['Sage','#9CAF88'],
  ['Moss','#8A9A5B'],['Fern','#4F7942'],['Grass','#7CFC00'],['Lime','#00FF00'],['Chartreuse','#7FFF00'],
  ['Avocado','#568203'],['Asparagus','#87A96B'],['Pistachio','#93C572'],['Celadon','#ACE1AF'],
  ['Brown','#964B00'],['Chocolate','#7B3F00'],['Coffee','#6F4E37'],['Mocha','#967259'],['Cocoa','#3F1F0F'],
  ['Sepia','#704214'],['Umber','#635147'],['Sienna','#A0522D'],['Mahogany','#C04000'],['Auburn','#A52A2A'],
  ['Copper','#B87333'],['Bronze','#CD7F32'],['Silver','#C0C0C0'],['Platinum','#E5E4E2'],['Stone','#928E85'],
  ['Smoke','#738276'],['Ash','#B2BEB5'],['Cloud','#C5C9C7'],['Fog','#A4ADA9'],['Mist','#C4C4C4'],
];

document.querySelector('.sidebar').innerHTML = `
  ${meshy.brandHtml('Name')}
  <div class="scroll">
    <div class="sec">
      <div class="sec-title">Pick a color</div>
      <input type="color" id="picker" value="#6BA6FF" style="margin-bottom:8px">
      <input type="text" id="hex" value="#6BA6FF" style="font-family:'SF Mono',monospace">
    </div>
    <div class="sec">
      <div class="sec-title">Browse by family</div>
      <div class="chips" id="families">
        <div class="chip" data-f="reds">Reds</div>
        <div class="chip" data-f="oranges">Oranges</div>
        <div class="chip" data-f="yellows">Yellows</div>
        <div class="chip" data-f="greens">Greens</div>
        <div class="chip" data-f="blues">Blues</div>
        <div class="chip" data-f="purples">Purples</div>
        <div class="chip" data-f="browns">Browns</div>
        <div class="chip" data-f="grays">Grays</div>
      </div>
    </div>
  </div>
  ${meshy.hintHtml()}
`;

document.querySelector('.sidebar.right').innerHTML = `
  <div class="brand"><div class="brand-name" style="font-size:18px">Similar Shades</div></div>
  <div class="scroll">
    <div class="sec" id="similarSec"></div>
  </div>
`;

function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = (g-b)/d + (g<b?6:0); break;
      case g: h = (b-r)/d + 2; break;
      case b: h = (r-g)/d + 4; break;
    }
    h /= 6;
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}
function dist(a,b){ const ar=hexToRgb(a), br=hexToRgb(b); return Math.sqrt((ar[0]-br[0])**2+(ar[1]-br[1])**2+(ar[2]-br[2])**2); }
function lum(rgb) { const a = rgb.map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}); return a[0]*0.2126+a[1]*0.7152+a[2]*0.0722; }

function findName(hex) {
  let best = NAMED[0], bestD = Infinity;
  for (const [n,h] of NAMED) { const d = dist(hex,h); if (d<bestD) { bestD=d; best=[n,h]; } }
  return best[0];
}

function render(hex) {
  const name = findName(hex);
  document.getElementById('name').textContent = name;
  document.getElementById('hexOut').textContent = hex.toUpperCase();
  const r = hexToRgb(hex);
  const [h,s,l] = rgbToHsl(...r);
  document.getElementById('rgbOut').textContent = `rgb(${r.join(', ')})`;
  document.getElementById('hslOut').textContent = `hsl(${h}, ${s}%, ${l}%)`;
  document.getElementById('canvas').style.background = hex;
  document.getElementById('canvas').style.color = lum(r) > 0.5 ? '#0a0a0a' : '#fff';

  const sim = NAMED.map(([nm,h]) => ({ nm, h, d: dist(hex, h) })).sort((a,b) => a.d-b.d).slice(1, 14);
  document.getElementById('similarSec').innerHTML = sim.map(s =>
    `<div class="sim-row" data-h="${s.h}"><div class="sim-sw" style="background:${s.h}"></div><div class="sim-meta"><div class="sim-name">${s.nm}</div><div class="sim-hex">${s.h.toUpperCase()}</div></div></div>`
  ).join('');
  document.querySelectorAll('.sim-row').forEach(r => r.addEventListener('click', () => update(r.dataset.h)));
}

function update(hex) {
  document.getElementById('picker').value = hex;
  document.getElementById('hex').value = hex.toUpperCase();
  render(hex);
}

document.getElementById('picker').addEventListener('input', e => update(e.target.value));
document.getElementById('hex').addEventListener('input', e => {
  let v = e.target.value.trim();
  if (!v.startsWith('#')) v = '#'+v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) update(v);
});
document.getElementById('randomBtn').addEventListener('click', () => {
  update(NAMED[Math.floor(Math.random()*NAMED.length)][1]);
});
document.getElementById('copyBtn').addEventListener('click', () => meshy.copy(document.getElementById('hex').value, 'Hex copied'));

const FAMILY_HEXES = { reds: '#DC143C', oranges: '#FFA500', yellows: '#FFD700', greens: '#228B22', blues: '#4169E1', purples: '#800080', browns: '#7B3F00', grays: '#708090' };
document.getElementById('families').addEventListener('click', e => {
  const c = e.target.closest('.chip');
  if (!c) return;
  update(FAMILY_HEXES[c.dataset.f]);
});

render('#6BA6FF');
</script>
</body>
</html>
