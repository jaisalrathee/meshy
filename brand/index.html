<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Brand Starter · meshy.fun</title>
<meta name="description" content="Type a name. Get a full brand kit: logomark, wordmark, palette, font pair." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Playfair+Display:wght@400;700&family=Lora:wght@400;700&family=Source+Serif+4:wght@400;700&family=DM+Serif+Display&family=Fraunces:wght@400;700&family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700&family=Outfit:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script defer src="https://api.pirsch.io/pa.js" id="pianjs" data-code="JNW76zWZEUF0RzRyD9UTUx3sSGtYNuI5"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">A brand, in seconds.</div>
      <button class="btn" id="regenBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/></svg>
        Regenerate
      </button>
      <button class="btn" id="surpriseBtn" title="Generate something completely new">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.91 5.66 5.59.81L15 13.75 16.36 19 12 16.23 7.64 19 9 13.75 4.5 9.47l5.59-.81z"/></svg>
        Surprise me
      </button>
      <button class="btn primary" id="downloadBtn">Download kit</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="brand-grid" id="brandGrid"></div>
    </div>
  </main>

  <aside class="sidebar right"></aside>
</div>

<style>
  .canvas { padding: 0; overflow-y: auto; }
  .brand-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1px;
    background: var(--line);
    min-height: 100%;
  }
  @media (max-width: 700px) {
    .brand-grid { grid-template-columns: 1fr; }
    .brand-tile.full { grid-column: 1 / -1; }
    .brand-tile { padding: 22px; }
  }
  .brand-tile { background: #fff; padding: 36px; display: flex; flex-direction: column; gap: 16px; }
  .brand-tile.full { grid-column: 1 / -1; }
  .tile-head { display: flex; align-items: center; justify-content: space-between; }
  .tile-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-3); font-weight: 600; }
  .tile-action { font-size: 11px; color: var(--ink-3); cursor: pointer; }
  .tile-action:hover { color: var(--ink); }
  .tile-content { display: flex; align-items: center; justify-content: center; min-height: 160px; }
  /* Logomark */
  .lock-up { display: flex; align-items: center; gap: 20px; }
  .lock-up .mark { width: 100px; height: 100px; flex-shrink: 0; }
  .lock-up .word { font-weight: 700; font-size: 38px; line-height: 1; letter-spacing: -0.02em; }
  /* Palette */
  .palette-row { display: flex; gap: 6px; width: 100%; }
  .palette-row .sw { flex: 1; aspect-ratio: 1/1.2; border-radius: 8px; position: relative; display: flex; align-items: flex-end; padding: 8px; color: #fff; font-family: 'SF Mono', monospace; font-size: 10px; cursor: pointer; }
  /* Type pair */
  .type-pair { width: 100%; }
  .type-head { font-size: 36px; line-height: 1.1; margin: 0 0 8px; font-weight: 700; letter-spacing: -0.02em; }
  .type-body { font-size: 14px; line-height: 1.55; margin: 0; color: var(--ink-2); }
  .type-meta { font-family: 'SF Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 12px; }
  /* Examples grid in sidebar */
  .example-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .example-card {
    aspect-ratio: 1/1.15;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: 1.5px solid transparent;
    background: #fafafa;
    transition: transform .15s ease, box-shadow .15s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6px;
  }
  .example-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .example-card.active { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink); }
  .example-card .ex-mark { width: 100%; aspect-ratio: 1; }
  .example-card .ex-mark svg { width: 100%; height: 100%; display: block; }
  .example-card .ex-name { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 13px; line-height: 1; text-align: center; color: var(--ink); }
  /* Avatar row */
  .avatar-row { display: flex; gap: 14px; align-items: center; }
  .avatar-row svg { width: 64px; height: 64px; }
  .avatar-row .a-sm svg { width: 32px; height: 32px; }
  .avatar-row .a-xs svg { width: 20px; height: 20px; }
</style>

function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lum(rgb) { const a = rgb.map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}); return a[0]*0.2126+a[1]*0.7152+a[2]*0.0722; }

function shapePath(shape, s) {
  switch (shape) {
    case 'circle': return `<circle cx="${s/2}" cy="${s/2}" r="${s/2}"/>`;
    case 'squircle': return `<rect width="${s}" height="${s}" rx="${s*0.32}"/>`;
    case 'rounded': return `<rect width="${s}" height="${s}" rx="${s*0.16}"/>`;
    case 'hexagon': {
      const cx = s/2, cy = s/2, r = s/2;
      const pts = [];
      for (let i = 0; i < 6; i++) { const a = (Math.PI/3)*i - Math.PI/2; pts.push(`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`); }
      return `<polygon points="${pts.join(' ')}"/>`;
    }
  }
}

function getInitials() {
  const words = state.name.trim().split(/\s+/).filter(Boolean);
  if (!words.length) return '?';
  if (words.length === 1) return words[0][0].toUpperCase();
  return (words[0][0] + words[words.length-1][0]).toUpperCase();
}

function buildLogomark(size = 200) {
  const colors = getColors();
  const localStops = getStops();
  const initials = getInitials();
  const avg = colors.reduce((a, c) => { const r = hexToRgb(c); return [a[0]+r[0], a[1]+r[1], a[2]+r[2]]; }, [0,0,0]).map(x => x/colors.length);
  const textCol = lum(avg) > 0.55 ? '#0a0a0a' : '#ffffff';
  const grads = colors.map((c, i) => {
    const [x, y] = localStops[i % localStops.length];
    return `<radialGradient id="bg${i}" cx="${x}%" cy="${y}%" r="55%"><stop offset="0%" stop-color="${c}" stop-opacity="0.95"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></radialGradient>`;
  }).join('');
  const layers = colors.map((c, i) =>
    `<rect width="100" height="100" fill="url(#bg${i})" style="mix-blend-mode:${i===0?'normal':'screen'}"/>`
  ).join('');
  let foreground;
  if (state.icon && ICONS[state.icon]) {
    const iconSize = 56;
    const tx = (100 - iconSize) / 2, ty = (100 - iconSize) / 2;
    const scale = iconSize / 24;
    foreground = `<g transform="translate(${tx} ${ty}) scale(${scale})" stroke="${textCol}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="${ICONS[state.icon]}"/></g>`;
  } else {
    const fontSize = initials.length === 1 ? 52 : 42;
    foreground = `<text x="50" y="50" text-anchor="middle" dominant-baseline="central" fill="${textCol}" font-family="${state.markFont}, sans-serif" font-weight="800" font-size="${fontSize}" letter-spacing="-0.02em">${initials}</text>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="${size}" height="${size}">
    <defs>${grads}<clipPath id="bclip">${shapePath(state.shape, 100)}</clipPath></defs>
    <g clip-path="url(#bclip)"><rect width="100" height="100" fill="${colors[0]}"/>${layers}</g>
    ${foreground}
  </svg>`;
}

function render() {

  `;
  // wire palette swatch clicks
  grid.querySelectorAll('.sw').forEach(sw => sw.addEventListener('click', () => meshy.copy(sw.dataset.c, sw.dataset.c.toUpperCase()+' copied')));
  // tile actions
  document.getElementById('exLogo')?.addEventListener('click', () => window.open('/logomark/', '_blank'));
  document.getElementById('exWord')?.addEventListener('click', () => window.open('/wordmark/', '_blank'));
  document.getElementById('exAv')?.addEventListener('click', () => window.open('/avatar/', '_blank'));
  document.getElementById('exPal')?.addEventListener('click', () => {
    const hash = btoa(unescape(encodeURIComponent(JSON.stringify({ c: colors }))));
    window.open('/mesh/#' + hash, '_blank');
  });
  document.getElementById('exFont')?.addEventListener('click', () => window.open('/fonts/', '_blank'));
}

function renderPalLock() {
  const wrap = document.getElementById('palLock');
  wrap.innerHTML = '';
  if (state.customPalette) {
    const el = document.createElement('div');
    el.className = 'thumb-card active';
    const cs = state.customStops || stops;
    el.style.background = state.customPalette.map((c, j) => `radial-gradient(at ${cs[j][0]}% ${cs[j][1]}%, ${c} 0px, transparent 50%)`).join(', ') + `, ${state.customPalette[0]}`;
    el.innerHTML = `<div class="name">✨ ${state.customLabel || 'Custom'}</div>`;
    wrap.appendChild(el);
  }
  PALETTES.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'thumb-card' + (!state.customPalette && i === state.palette ? ' active' : '');
    el.style.background = p.colors.map((c, j) => `radial-gradient(at ${stops[j][0]}% ${stops[j][1]}%, ${c} 0px, transparent 50%)`).join(', ') + `, ${p.colors[0]}`;
    el.innerHTML = `<div class="name">${p.name}</div>`;
    el.addEventListener('click', () => {
      state.palette = i;
      state.customPalette = null; state.customStops = null; state.customLabel = null;
      renderPalLock(); render();
    });
    wrap.appendChild(el);
  });
}

function escape(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

document.getElementById('name').addEventListener('input', e => { state.name = e.target.value; render(); });
document.getElementById('shapeChips').addEventListener('click', e => {
  const c = e.target.closest('.chip');
  if (!c) return;
  document.querySelectorAll('#shapeChips .chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  state.shape = c.dataset.s;
  render();
});

function regenerate() {
  state.palette = Math.floor(Math.random() * PALETTES.length);
  state.customPalette = null; state.customStops = null; state.customLabel = null;
  state.pair = Math.floor(Math.random() * FONT_PAIRS.length);
  renderPalLock();
  render();
}
document.getElementById('regenBtn').addEventListener('click', regenerate);

document.getElementById('surpriseBtn').addEventListener('click', () => {
  const harmonies = ['analogous','complementary','triadic','tetradic','monochromatic','split','warm','cool','duotone'];
  const harmony = meshy.pickOne(harmonies);
  state.customPalette = meshy.randomPalette({ harmony });
  state.customStops = meshy.randomStops();
  state.customLabel = harmony.charAt(0).toUpperCase() + harmony.slice(1);
  state.pair = Math.floor(Math.random() * FONT_PAIRS.length);
  state.shape = meshy.pickOne(SHAPES);
  document.querySelectorAll('#shapeChips .chip').forEach(c => c.classList.toggle('active', c.dataset.s === state.shape));
  renderPalLock();
  render();
  meshy.toast(`✨ ${state.customLabel} harmony`);
});

function brandJson() {
  const colors = getColors();
  const pair = FONT_PAIRS[state.pair];
  const palName = state.customPalette ? `Custom (${state.customLabel || 'random'})` : PALETTES[state.palette].name;
  return JSON.stringify({
    name: state.name,
    palette: { name: palName, colors },
    typography: { headline: pair.head, body: pair.body, vibe: pair.vibe },
    logomark: { shape: state.shape, initials: getInitials() },
  }, null, 2);
}

document.getElementById('copyJsonBtn').addEventListener('click', () => meshy.copy(brandJson(), 'Brand JSON copied'));

function downloadKit() {
  const safeName = state.name.replace(/[^a-z0-9]/gi,'-').toLowerCase() || 'brand';
  const colors = getColors();
  const pair = FONT_PAIRS[state.pair];

  // 1. logomark.svg
  downloadBlob(buildLogomark(512), 'image/svg+xml', `${safeName}-logomark.svg`);
  // 2. logomark.png (via canvas)
  setTimeout(() => svgToPng(buildLogomark(1024), 1024, `${safeName}-logomark.png`), 200);
  // 3. avatar (same as logomark for now)
  setTimeout(() => svgToPng(buildLogomark(512), 512, `${safeName}-avatar-512.png`), 400);
  // 4. palette.css
  setTimeout(() => {
    const css = `:root {\n${colors.map((c, i) => `  --brand-${i+1}: ${c};`).join('\n')}\n}`;
    downloadBlob(css, 'text/css', `${safeName}-palette.css`);
  }, 600);
  // 5. typography.css
  setTimeout(() => {
    const css = `@import url('https://fonts.googleapis.com/css2?family=${pair.head.replace(/ /g,'+')}&family=${pair.body.replace(/ /g,'+')}&display=swap');\n\n:root {\n  --font-head: '${pair.head}', serif;\n  --font-body: '${pair.body}', sans-serif;\n}\n\nh1, h2, h3 { font-family: var(--font-head); }\nbody { font-family: var(--font-body); }`;
    downloadBlob(css, 'text/css', `${safeName}-typography.css`);
  }, 800);
  // 6. brand.json
  setTimeout(() => downloadBlob(brandJson(), 'application/json', `${safeName}-brand.json`), 1000);

  meshy.toast('Downloading brand kit...');
}

function downloadBlob(content, type, name) {
  const blob = new Blob([content], { type });
  const link = document.createElement('a');
  link.download = name;
  link.href = URL.createObjectURL(blob);
  link.click();
}

function svgToPng(svgStr, size, name) {
  const img = new Image();
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    c.getContext('2d').drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const link = document.createElement('a');
    link.download = name;
    link.href = c.toDataURL('image/png');
    link.click();
  };
  img.src = url;
}

document.getElementById('downloadBtn').addEventListener('click', downloadKit);
document.getElementById('downloadBtn2').addEventListener('click', downloadKit);

// Build a mini logomark thumbnail for any state-like object
function buildMiniLogomark(ex, size = 80) {
  const colors = ex.colors;
  const ls = stops;
  const grads = colors.map((c, i) => {
    const [x, y] = ls[i % ls.length];
    return `<radialGradient id="ex${ex.name}${i}" cx="${x}%" cy="${y}%" r="55%"><stop offset="0%" stop-color="${c}" stop-opacity="0.95"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></radialGradient>`;
  }).join('');
  const layers = colors.map((c, i) => `<rect width="100" height="100" fill="url(#ex${ex.name}${i})" style="mix-blend-mode:${i===0?'normal':'screen'}"/>`).join('');
  const avg = colors.reduce((a, c) => { const r = hexToRgb(c); return [a[0]+r[0], a[1]+r[1], a[2]+r[2]]; }, [0,0,0]).map(x => x/colors.length);
  const textCol = lum(avg) > 0.55 ? '#0a0a0a' : '#ffffff';
  let fg;
  if (ex.icon && ICONS[ex.icon]) {
    const iconSize = 56, tx = (100-iconSize)/2, ty = (100-iconSize)/2, scale = iconSize/24;
    fg = `<g transform="translate(${tx} ${ty}) scale(${scale})" stroke="${textCol}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="${ICONS[ex.icon]}"/></g>`;
  } else {
    const initial = ex.name[0].toUpperCase();
    fg = `<text x="50" y="50" text-anchor="middle" dominant-baseline="central" fill="${textCol}" font-family="Manrope, sans-serif" font-weight="800" font-size="52">${initial}</text>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="${size}" height="${size}"><defs>${grads}<clipPath id="exclip${ex.name}">${shapePath(ex.shape, 100)}</clipPath></defs><g clip-path="url(#exclip${ex.name})"><rect width="100" height="100" fill="${colors[0]}"/>${layers}</g>${fg}</svg>`;
}

function renderExamples() {
  const wrap = document.getElementById('examplesGrid');
  wrap.innerHTML = '';
  EXAMPLES.forEach(ex => {
    const el = document.createElement('div');
    const isActive = state.customLabel === `Example: ${ex.name}`;
    el.className = 'example-card' + (isActive ? ' active' : '');
    el.innerHTML = `<div class="ex-mark">${buildMiniLogomark(ex, 100)}</div><div class="ex-name">${ex.name}</div>`;
    el.title = `${ex.name} — ${ex.tag}`;
    el.addEventListener('click', () => loadExample(ex));
    wrap.appendChild(el);
  });
}

function loadExample(ex) {
  state.name = ex.name;
  state.customPalette = ex.colors;
  state.customStops = stops;
  state.customLabel = `Example: ${ex.name}`;
  state.shape = ex.shape;
  state.pair = ex.pair;
  state.icon = ex.icon || null;
  // Sync UI
  document.getElementById('name').value = state.name;
  document.querySelectorAll('#shapeChips .chip').forEach(c => c.classList.toggle('active', c.dataset.s === state.shape));
  renderExamples();
  renderPalLock();
  render();
  meshy.toast(`Loaded ${ex.name}`);
}

// Wrap regenerate/surprise to clear example marker and icon
const _regen = document.getElementById('regenBtn');
const _origRegen = _regen.onclick;
document.getElementById('regenBtn').addEventListener('click', () => { state.icon = null; renderExamples(); });
document.getElementById('surpriseBtn').addEventListener('click', () => { state.icon = null; renderExamples(); });

renderExamples();
renderPalLock();
render();
</script>
