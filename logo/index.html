<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">A logo, considered.</div>
      <button class="btn" id="randomBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Random
      </button>
      <button class="btn" id="surpriseBtn" title="Generate entirely new design via color harmony">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.91 5.66 5.59.81L15 13.75 16.36 19 12 16.23 7.64 19 9 13.75 4.5 9.47l5.59-.81z"/></svg>
        Surprise me
      </button>
      <button class="btn" id="svgBtn">SVG</button>
      <div class="dropdown" id="exportDD">
        <button class="btn primary" id="exportBtn">Export pack ▾</button>
        <div class="dropdown-menu" id="exportMenu">
          <div class="menu-section">PNG</div>
          <button data-export="png-1024">PNG · 1024px</button>
          <button data-export="png-2048">PNG · 2048px</button>
          <button data-export="png-4096">PNG · 4096px (print)</button>
          <div class="menu-section">SVG</div>
          <button data-export="svg-light">SVG · light</button>
          <button data-export="svg-dark">SVG · dark variant</button>
          <div class="menu-section">App icons</div>
          <button data-export="favicon">Favicon set (16/32/180/512)</button>
          <button data-export="social">Social pack (OG, X header, square)</button>
        </div>
      </div>
    </div>

    <div class="canvas" id="canvas">
      <div class="logo-stage" id="logoStage"></div>
    </div>

    <div class="canvas-bottom">
      <div class="context-row" id="contextRow"></div>
    </div>
  </main>

  <aside class="sidebar right"></aside>
</div>

<style>
.canvas { display: flex; align-items: center; justify-content: center; padding: 30px; background: #fafafa; }
.canvas.dark { background: #0a0a0a; }
.logo-stage { width: 100%; max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center; }
.logo-stage svg { max-width: 100%; max-height: 56vh; }

/* Context preview row */
.context-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 8px 0; }
.ctx { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
.ctx .ctx-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3); font-weight: 600; margin-bottom: 8px; }
.ctx-content { display: flex; align-items: center; justify-content: center; height: 90px; overflow: hidden; }
.ctx.dark { background: #0a0a0a; }
.ctx.dark .ctx-label { color: #525252; }
.ctx-favicon { background: #f0eee9; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 18px 12px; gap: 8px; }
.ctx-favicon svg { width: 18px; height: 18px; flex-shrink: 0; }
.ctx-favicon .url-bar { background: #fff; border-radius: 8px; padding: 6px 10px; font-size: 11px; color: var(--ink-2); flex: 1; font-family: 'JetBrains Mono', monospace; }
.ctx-card { background: linear-gradient(135deg, #f5f5f0, #fafaf9); border-radius: 8px; padding: 18px 14px; box-shadow: 0 4px 12px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: center; }
.ctx-card svg { max-width: 80%; max-height: 60%; }
.ctx-mobile { background: #1a1a1f; border-radius: 14px; padding: 14px 16px 8px; display: flex; flex-direction: column; gap: 8px; height: 100%; }
.ctx-mobile .status-bar { display: flex; justify-content: space-between; font-size: 8px; color: #aaa; font-family: 'JetBrains Mono', monospace; }
.ctx-mobile .app-icon-row { display: flex; gap: 8px; align-items: center; justify-content: center; flex: 1; }
.ctx-mobile .app-icon { width: 36px; height: 36px; border-radius: 8px; background: #2a2a2f; display: flex; align-items: center; justify-content: center; }
.ctx-mobile .app-icon.feature { box-shadow: 0 0 0 1.5px #fff; }
.ctx-mobile .app-icon svg, .ctx-mobile .app-icon img { width: 28px; height: 28px; }
.ctx-tshirt { background: #f5f1e8; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 14px; position: relative; overflow: hidden; }
.ctx-tshirt::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(0,0,0,.04), transparent 60%); }
.ctx-tshirt svg { max-width: 56%; max-height: 60%; position: relative; z-index: 1; }

/* Library grid */
.lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.lib-tile {
  aspect-ratio: 1.5/1;
  background: #fff;
  border: 1.5px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .12s ease, border-color .12s ease;
}
.lib-tile:hover { transform: translateY(-2px); border-color: #e0e0e0; }
.lib-tile.active { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink); }
.lib-tile svg { max-width: 100%; max-height: 100%; }

/* Color picker grid */
.cmode-row { display: flex; gap: 6px; flex-wrap: wrap; }
.color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-top: 8px; }
.color-grid .swatch { aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 1.5px solid transparent; }
.color-grid .swatch.active { border-color: var(--ink); transform: scale(0.92); }
.palette-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.palette-tile { aspect-ratio: 2/1; border-radius: 6px; cursor: pointer; border: 1.5px solid transparent; overflow: hidden; }
.palette-tile.active { border-color: var(--ink); }
.palette-tile .strip { display: flex; height: 100%; }
.palette-tile .strip span { flex: 1; }

/* Icon picker */
.icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; padding: 2px; }
.icon-pick { aspect-ratio: 1; border-radius: 6px; background: var(--line-2); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid transparent; transition: all .1s; }
.icon-pick:hover { background: #eaeaea; }
.icon-pick.active { background: var(--ink); border-color: var(--ink); }
.icon-pick.active svg { color: #fff; }
.icon-pick svg { width: 60%; height: 60%; color: var(--ink); }

/* Dropdown */
.dropdown { position: relative; }
.dropdown-menu { position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 6px; box-shadow: var(--shadow); min-width: 240px; z-index: 50; display: none; }
.dropdown.open .dropdown-menu { display: block; }
.dropdown-menu .menu-section { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3); padding: 8px 10px 4px; font-weight: 600; }
.dropdown-menu button { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 7px 10px; border-radius: 7px; font-family: inherit; font-size: 12px; color: var(--ink); cursor: pointer; }
.dropdown-menu button:hover { background: var(--line-2); }

/* Font picker (small label-style chips with the font shown) */
.font-pick { padding: 7px 11px; border-radius: 8px; background: var(--line-2); cursor: pointer; border: 1px solid transparent; font-size: 13px; line-height: 1; transition: all .12s; }
.font-pick:hover { background: #eaeaea; }
.font-pick.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.font-chips { display: flex; flex-wrap: wrap; gap: 4px; }

@media (max-width: 880px) {
  .context-row { grid-template-columns: 1fr 1fr; }
}
</style>

// ---------- Helpers ----------
function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lum(rgb) { const a = rgb.map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}); return a[0]*0.2126+a[1]*0.7152+a[2]*0.0722; }
function escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function transformText(t, c) { if (c === 'lower') return t.toLowerCase(); if (c === 'upper') return t.toUpperCase(); return t; }
function autoTextColor(bg) { return lum(hexToRgb(bg)) > 0.55 ? '#0a0a0a' : '#ffffff'; }

function shapePath(shape, s) {
  switch (shape) {
    case 'circle':   return `<circle cx="${s/2}" cy="${s/2}" r="${s/2}"/>`;
    case 'squircle': return `<rect width="${s}" height="${s}" rx="${s*0.30}"/>`;
    case 'rounded':  return `<rect width="${s}" height="${s}" rx="${s*0.14}"/>`;
    case 'square':   return `<rect width="${s}" height="${s}"/>`;
    case 'hexagon': {
      const cx=s/2, cy=s/2, r=s/2;
      const pts=[];
      for (let i=0;i<6;i++){ const a=(Math.PI/3)*i - Math.PI/2; pts.push(`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`); }
      return `<polygon points="${pts.join(' ')}"/>`;
    }
  }
  return '';
}

// ---------- Render a mark element (inside an SVG group, sized to 100x100) ----------
let _gradId = 0;
function nextGradId() { return 'g' + (++_gradId); }

function renderMarkSvg(m, sizeBox = 100) {
  if (m.type === 'none') return { svg: '', width: 0, height: 0 };

  // Determine fill spec — solid / gradient / mesh / outline
  let fillDefs = '', fillAttr = '#000', layers = '';
  if (m.mode === 'solid') {
    fillAttr = m.color || '#0a0a0a';
  } else if (m.mode === 'gradient') {
    const id = nextGradId();
    fillDefs = `<linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${m.color}"/><stop offset="100%" stop-color="${m.color2}"/></linearGradient>`;
    fillAttr = `url(#${id})`;
  } else if (m.mode === 'mesh') {
    const colors = PALETTES[m.palette] || PALETTES.iris;
    const ids = colors.map(() => nextGradId());
    fillDefs = colors.map((c, i) => {
      const [x, y] = stops[i % stops.length];
      return `<radialGradient id="${ids[i]}" cx="${x}%" cy="${y}%" r="55%"><stop offset="0%" stop-color="${c}" stop-opacity="0.95"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></radialGradient>`;
    }).join('');
    fillAttr = colors[0];
    layers = colors.map((c, i) => `<rect width="${sizeBox}" height="${sizeBox}" fill="url(#${ids[i]})" style="mix-blend-mode:${i===0?'normal':'screen'}"/>`).join('');
  }

  // Decide if we're rendering a "shape with content inside" or "icon with no enclosing shape"
  const hasShape = m.shape && m.shape !== 'none';
  let body = '';

  if (hasShape) {
    // Outer shape clip + fill
    const shapeD = shapePath(m.shape, sizeBox);
    const clipId = 'c' + (++_gradId);
    fillDefs += `<clipPath id="${clipId}">${shapeD}</clipPath>`;
    if (m.strokeOnly) {
      // Outline-only shape — different rendering
      const strokeW = m.strokeWidth || 2;
      // The shape path is a circle/rect — extract just the geometry
      body = renderStrokedShape(m.shape, sizeBox, m.color || '#0a0a0a', strokeW);
    } else {
      // Filled shape
      body = `<g clip-path="url(#${clipId})">
        <rect width="${sizeBox}" height="${sizeBox}" fill="${fillAttr}"/>
        ${layers}
      </g>`;
    }
    // Add icon or letter on top
    if (m.type === 'icon' && ICONS[m.value]) {
      const tc = m.textColor || (m.strokeOnly ? (m.color || '#0a0a0a') : autoTextColor(fillAttr));
      const iconScale = sizeBox * 0.5 / 24;
      const tx = (sizeBox - 24 * iconScale) / 2, ty = (sizeBox - 24 * iconScale) / 2;
      body += `<g transform="translate(${tx} ${ty}) scale(${iconScale})" stroke="${tc}" stroke-width="${(m.strokeOnly ? 2 : 2)}" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="${ICONS[m.value]}"/></g>`;
    } else if (m.type === 'letter') {
      const tc = m.textColor || autoTextColor(fillAttr);
      const fs = sizeBox * 0.55;
      const font = m.font || 'Inter';
      body += `<text x="${sizeBox/2}" y="${sizeBox/2}" text-anchor="middle" dominant-baseline="central" fill="${tc}" font-family="${fontStack(font)}" font-weight="800" font-size="${fs}" letter-spacing="-0.02em">${escape(m.value || 'A')}</text>`;
    }
  } else {
    // No outer shape — render the icon or letter at full mark size
    if (m.type === 'icon' && ICONS[m.value]) {
      const iconScale = sizeBox / 24;
      if (m.strokeOnly) {
        const strokeW = m.strokeWidth || 2;
        body = `<g transform="scale(${iconScale})" stroke="${m.color || '#0a0a0a'}" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="${ICONS[m.value]}"/></g>`;
      } else {
        body = `<g transform="scale(${iconScale})" fill="${fillAttr}" stroke="none"><path d="${ICONS[m.value]}"/></g>`;
        if (m.mode === 'mesh') {
          // Mesh fill on no-shape icon — needs clip-path of the icon
          const clipId = 'ic' + (++_gradId);
          fillDefs += `<clipPath id="${clipId}"><g transform="scale(${iconScale})"><path d="${ICONS[m.value]}"/></g></clipPath>`;
          body = `<g clip-path="url(#${clipId})"><rect width="${sizeBox}" height="${sizeBox}" fill="${fillAttr}"/>${layers}</g>`;
        }
      }
    } else if (m.type === 'letter') {
      const fs = sizeBox * 0.85;
      const font = m.font || 'Inter';
      body = `<text x="${sizeBox/2}" y="${sizeBox/2}" text-anchor="middle" dominant-baseline="central" fill="${m.color || '#0a0a0a'}" font-family="${fontStack(font)}" font-weight="800" font-size="${fs}" letter-spacing="-0.04em">${escape(m.value || 'A')}</text>`;
    }
  }

  return { svg: `<defs>${fillDefs}</defs>${body}`, width: sizeBox, height: sizeBox };
}

function renderStrokedShape(shape, s, color, sw) {
  switch (shape) {
    case 'circle':   return `<circle cx="${s/2}" cy="${s/2}" r="${s/2 - sw/2}" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
    case 'squircle': return `<rect x="${sw/2}" y="${sw/2}" width="${s-sw}" height="${s-sw}" rx="${(s-sw)*0.3}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linejoin="round"/>`;
    case 'rounded':  return `<rect x="${sw/2}" y="${sw/2}" width="${s-sw}" height="${s-sw}" rx="${(s-sw)*0.14}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linejoin="round"/>`;
    case 'square':   return `<rect x="${sw/2}" y="${sw/2}" width="${s-sw}" height="${s-sw}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linejoin="round"/>`;
    case 'hexagon': {
      const cx=s/2, cy=s/2, r=s/2 - sw/2;
      const pts=[];
      for (let i=0;i<6;i++){ const a=(Math.PI/3)*i - Math.PI/2; pts.push(`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`); }
      return `<polygon points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linejoin="round"/>`;
    }
  }
  return '';
}

// ---------- Measure text width using offscreen canvas ----------
const measureCtx = document.createElement('canvas').getContext('2d');
function measureTextWidth(text, font, weight, size, italic = false, tracking = 0) {
  measureCtx.font = `${italic?'italic ':''}${weight} ${size}px ${fontStack(font)}`;
  let w = measureCtx.measureText(text).width;
  if (tracking) w += tracking * size * Math.max(0, text.length - 1);
  return w;
}

// ---------- Compose the full logo SVG ----------
function buildLogo(opts = {}) {
  _gradId = 0;
  const s = opts.state || state;
  const MARK_SIZE = 100;
  const FONT_SIZE = 64;
  const TAGLINE_SIZE = 18;
  const TAGLINE_TRACKING_DEFAULT = 0.06;

  const layout = s.layout || 'horizontal';
  const hasMark = layout !== 'wordmark';
  const hasText = layout !== 'mark-only';
  const tagline = s.tagline ? transformText(s.tagline, s.text.case) : '';
  const name = transformText(s.text.name || '', s.text.case);

  let markBlock = '';
  let markW = 0, markH = 0;
  if (hasMark) {
    const m = renderMarkSvg(s.mark, MARK_SIZE);
    markBlock = m.svg;
    markW = m.width; markH = m.height;
  }

  const f = s.text;
  const textW = hasText ? measureTextWidth(name, f.font, f.weight, FONT_SIZE, f.italic, f.tracking) : 0;
  const textH = FONT_SIZE * 1.05;
  let tagW = 0, tagH = 0;
  if (tagline) {
    tagW = measureTextWidth(tagline, f.font, 500, TAGLINE_SIZE, false, TAGLINE_TRACKING_DEFAULT);
    tagH = TAGLINE_SIZE * 1.4;
  }

  let W, H, layoutSvg = '';
  const spacing = s.spacing != null ? s.spacing : 14;
  const padding = 24;

  if (layout === 'mark-only') {
    W = MARK_SIZE + padding*2;
    H = MARK_SIZE + padding*2;
    layoutSvg = `<g transform="translate(${padding} ${padding})">${markBlock}</g>`;
  }
  else if (layout === 'wordmark') {
    W = textW + padding*2;
    H = textH + (tagline ? tagH + 8 : 0) + padding*2;
    const textY = padding + FONT_SIZE * 0.82;
    layoutSvg = `<text x="${padding}" y="${textY}" font-family="${fontStack(f.font)}" font-weight="${f.weight}" font-size="${FONT_SIZE}" letter-spacing="${f.tracking}em" ${f.italic?'font-style="italic"':''} fill="${f.color}">${escape(name)}</text>`;
    if (tagline) {
      layoutSvg += `<text x="${padding}" y="${textY + tagH}" font-family="${fontStack(f.font)}" font-weight="500" font-size="${TAGLINE_SIZE}" letter-spacing="${TAGLINE_TRACKING_DEFAULT}em" fill="${f.color}" opacity="0.6">${escape(tagline)}</text>`;
    }
  }
  else if (layout === 'horizontal') {
    W = padding + markW + spacing + textW + padding;
    H = padding + Math.max(markH, textH + (tagline ? tagH + 6 : 0)) + padding;
    const cy = H / 2;
    layoutSvg = `<g transform="translate(${padding} ${cy - markH/2})">${markBlock}</g>`;
    const textX = padding + markW + spacing;
    if (tagline) {
      const totalTextH = textH + 6 + tagH;
      const textTop = cy - totalTextH/2 + FONT_SIZE * 0.82;
      layoutSvg += `<text x="${textX}" y="${textTop}" font-family="${fontStack(f.font)}" font-weight="${f.weight}" font-size="${FONT_SIZE}" letter-spacing="${f.tracking}em" ${f.italic?'font-style="italic"':''} fill="${f.color}">${escape(name)}</text>`;
      layoutSvg += `<text x="${textX}" y="${textTop + tagH}" font-family="${fontStack(f.font)}" font-weight="500" font-size="${TAGLINE_SIZE}" letter-spacing="${TAGLINE_TRACKING_DEFAULT}em" fill="${f.color}" opacity="0.6">${escape(tagline)}</text>`;
    } else {
      const textY = cy + FONT_SIZE * 0.32;
      layoutSvg += `<text x="${textX}" y="${textY}" font-family="${fontStack(f.font)}" font-weight="${f.weight}" font-size="${FONT_SIZE}" letter-spacing="${f.tracking}em" ${f.italic?'font-style="italic"':''} fill="${f.color}">${escape(name)}</text>`;
    }
  }
  else if (layout === 'vertical') {
    W = padding*2 + Math.max(markW, textW, tagW);
    const blockH = markH + spacing + textH + (tagline ? 6 + tagH : 0);
    H = padding*2 + blockH;
    const cx = W / 2;
    layoutSvg = `<g transform="translate(${cx - markW/2} ${padding})">${markBlock}</g>`;
    const textY = padding + markH + spacing + FONT_SIZE * 0.82;
    layoutSvg += `<text x="${cx}" y="${textY}" text-anchor="middle" font-family="${fontStack(f.font)}" font-weight="${f.weight}" font-size="${FONT_SIZE}" letter-spacing="${f.tracking}em" ${f.italic?'font-style="italic"':''} fill="${f.color}">${escape(name)}</text>`;
    if (tagline) {
      layoutSvg += `<text x="${cx}" y="${textY + tagH}" text-anchor="middle" font-family="${fontStack(f.font)}" font-weight="500" font-size="${TAGLINE_SIZE}" letter-spacing="${TAGLINE_TRACKING_DEFAULT}em" fill="${f.color}" opacity="0.65">${escape(tagline)}</text>`;
    }
  }
  else if (layout === 'badge') {
    // Mark centered, text below in upper case wide tracking
    const badgeFontSize = 22;
    const badgeName = transformText(s.text.name || '', s.text.case || 'upper');
    const nameW = measureTextWidth(badgeName, f.font, f.weight, badgeFontSize, false, f.tracking || 0.16);
    const tagFontSize = 11;
    const tagBadge = tagline ? transformText(tagline, 'upper') : '';
    const tagBadgeW = tagBadge ? measureTextWidth(tagBadge, f.font, 500, tagFontSize, false, 0.16) : 0;
    W = padding*2 + Math.max(markW, nameW, tagBadgeW);
    const block = markH + 12 + badgeFontSize + (tagBadge ? 6 + tagFontSize : 0);
    H = padding*2 + block;
    const cx = W/2;
    layoutSvg = `<g transform="translate(${cx - markW/2} ${padding})">${markBlock}</g>`;
    const nameY = padding + markH + 12 + badgeFontSize * 0.82;
    layoutSvg += `<text x="${cx}" y="${nameY}" text-anchor="middle" font-family="${fontStack(f.font)}" font-weight="${f.weight}" font-size="${badgeFontSize}" letter-spacing="0.16em" fill="${f.color}">${escape(badgeName)}</text>`;
    if (tagBadge) {
      layoutSvg += `<text x="${cx}" y="${nameY + 6 + tagFontSize}" text-anchor="middle" font-family="${fontStack(f.font)}" font-weight="500" font-size="${tagFontSize}" letter-spacing="0.16em" fill="${f.color}" opacity="0.6">${escape(tagBadge)}</text>`;
    }
  }

  const bgFill = s.bg === 'dark' ? '#0a0a0a' : (s.bg === 'cream' ? '#FBF6E9' : '#ffffff');
  const includeBg = opts.includeBg !== undefined ? opts.includeBg : (s.bg === 'dark' || s.bg === 'cream');
  const bg = includeBg ? `<rect width="${W}" height="${H}" fill="${bgFill}"/>` : '';
  return { svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">${bg}${layoutSvg}</svg>`, W, H };
}

// Build mark-only SVG (for favicons / contexts)
function buildMarkOnly(opts = {}) {
  const s = { ...state, layout: 'mark-only' };
  return buildLogo({ state: s, ...opts });
}

function buildDarkVariant() {
  const s = JSON.parse(JSON.stringify(state));
  s.bg = 'dark';
  s.text.color = '#ffffff';
  // invert solid black marks to white
  if (s.mark.mode === 'solid' && s.mark.color && s.mark.color.toLowerCase() === '#0a0a0a') {
    s.mark.color = '#ffffff';
    s.mark.textColor = '#0a0a0a';
  }
  return buildLogo({ state: s });
}

// ---------- Library tiles ----------
function renderLibrary() {
  const wrap = document.getElementById('libGrid');
  const cat = state._catFilter || 'All';
  const list = LIBRARY.filter(t => cat === 'All' || t.cat === cat);
  wrap.innerHTML = '';
  list.forEach(t => {
    const el = document.createElement('div');
    el.className = 'lib-tile' + (t.id === state.template ? ' active' : '');
    el.title = `${t.name} · ${t.cat}`;
    const tile = buildLogo({ state: { ...t, template: t.id }, includeBg: true }).svg;
    el.innerHTML = tile;
    el.addEventListener('click', () => loadTemplate(t.id));
    wrap.appendChild(el);
  });
  // categories
  const cats = ['All', ...Array.from(new Set(LIBRARY.map(t => t.cat)))];
  const chips = document.getElementById('catChips');
  chips.innerHTML = cats.map(c => `<div class="chip ${c === cat ? 'active' : ''}" data-cat="${c}" style="font-size:11px;padding:4px 9px">${c}</div>`).join('');
}

function loadTemplate(id) {
  const t = LIBRARY.find(x => x.id === id);
  if (!t) return;
  Object.assign(state, JSON.parse(JSON.stringify(t)));
  state.template = id;
  render();
  renderLibrary();
  document.getElementById('name').value = state.text.name;
  document.getElementById('tagline').value = state.tagline || '';
  document.getElementById('textColor').value = state.text.color;
  document.getElementById('markColor').value = state.mark.color || '#0a0a0a';
  if (state.mark.color2) document.getElementById('markColor2').value = state.mark.color2;
  document.getElementById('letterVal').value = state.mark.value || 'A';
}

    document.querySelectorAll(selector + ' .chip').forEach(c => c.classList.toggle('active', c.dataset[attr] === String(val)));
  }
  setActive('#layoutChips', 'l', state.layout);
  setActive('#shapeChips', 's', state.mark.shape || 'none');
  setActive('#bgChips', 'b', state.bg || 'light');
  setActive('#markTypeChips', 't', state.mark.type);
  setActive('#caseChips', 'c', state.text.case || 'as-is');
  setActive('#italicChips', 'i', state.text.italic ? '1' : '0');
  setActive('#modeChips', 'm', state.mark.mode || 'solid');
  setActive('#strokeChips', 'so', state.mark.strokeOnly ? '1' : '0');
  // font picks
  document.querySelectorAll('#fontChips .font-pick').forEach(p => p.classList.toggle('active', p.dataset.f === state.text.font));
  // ranges
  document.getElementById('weight').value = state.text.weight;
  document.getElementById('weightVal').textContent = state.text.weight;
  document.getElementById('tracking').value = Math.round(state.text.tracking * 1000);
  document.getElementById('trackingVal').textContent = state.text.tracking.toFixed(3) + 'em';
  document.getElementById('spacing').value = state.spacing || 14;
  document.getElementById('spacingVal').textContent = state.spacing || 14;

document.getElementById('exportMenu').addEventListener('click', async e => {
  const btn = e.target.closest('button'); if (!btn) return;
  document.getElementById('exportDD').classList.remove('open');
  const kind = btn.dataset.export;
  if (kind.startsWith('png-')) {
    const size = parseInt(kind.split('-')[1]);
    const built = buildLogo({ includeBg: true });
    await svgToPng(built.svg, built.W, built.H, size, `${slug(state.text.name)}-${size}.png`);
    meshy.toast(`PNG · ${size}px exported`);
  } else if (kind === 'svg-light') {
    download(buildLogo({ includeBg: true }).svg, `${slug(state.text.name)}-light.svg`, 'image/svg+xml');
  } else if (kind === 'svg-dark') {
    download(buildDarkVariant().svg, `${slug(state.text.name)}-dark.svg`, 'image/svg+xml');
  } else if (kind === 'favicon') {
    const built = buildMarkOnly({ includeBg: false });
    for (const sz of [16, 32, 180, 512]) {
      await svgToPng(built.svg, built.W, built.H, sz, `favicon-${sz}.png`);
      await new Promise(r => setTimeout(r, 150));
    }
    meshy.toast('Favicon set exported');
  } else if (kind === 'social') {
    const built = buildLogo({ includeBg: true });
    for (const [w, h, name] of [[1200, 630, 'og'], [1500, 500, 'x-header'], [2048, 2048, 'avatar']]) {
      await svgToCanvasFit(built.svg, built.W, built.H, w, h, `${slug(state.text.name)}-${name}.png`);
      await new Promise(r => setTimeout(r, 150));
    }
    meshy.toast('Social pack exported');
  }
});

function slug(s) { return (s || 'logo').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
function download(content, name, type) {
  const blob = new Blob([content], { type });
  const link = document.createElement('a'); link.download = name; link.href = URL.createObjectURL(blob); link.click();
}
function svgToPng(svgStr, srcW, srcH, targetW, name) {
  return new Promise((resolve) => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const scale = targetW / srcW;
      const c = document.createElement('canvas');
      c.width = targetW; c.height = Math.round(srcH * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(url);
      const link = document.createElement('a'); link.download = name; link.href = c.toDataURL('image/png'); link.click();
      resolve();
    };
    img.src = url;
  });
}
function svgToCanvasFit(svgStr, srcW, srcH, targetW, targetH, name) {
  return new Promise((resolve) => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = targetW; c.height = targetH;
      const ctx = c.getContext('2d');
      ctx.fillStyle = state.bg === 'dark' ? '#0a0a0a' : (state.bg === 'cream' ? '#FBF6E9' : '#ffffff');
      ctx.fillRect(0, 0, targetW, targetH);
      const scale = Math.min(targetW / srcW, targetH / srcH) * 0.78;
      const w = srcW * scale, h = srcH * scale;
      const x = (targetW - w) / 2, y = (targetH - h) / 2;
      ctx.drawImage(img, x, y, w, h);
      URL.revokeObjectURL(url);
      const link = document.createElement('a'); link.download = name; link.href = c.toDataURL('image/png'); link.click();
      resolve();
    };
    img.src = url;
  });
}

// ---------- Init ----------
renderLibrary();
renderPaletteGrid();
renderIconGrid();
render();
</script>
</body>
