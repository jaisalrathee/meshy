<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dither · meshy.fun</title>
<meta name="description" content="Retro Bayer and Floyd-Steinberg dithering. 1-bit or color." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script defer src="https://api.pirsch.io/pa.js" id="pianjs" data-code="JNW76zWZEUF0RzRyD9UTUx3sSGtYNuI5"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">A retro dither.</div>
      <button class="btn" id="uploadBtn">Upload</button>
      <button class="btn primary" id="exportBtn">Export PNG</button>
    </div>
    <div class="canvas" id="canvasWrap"><canvas id="outCanvas"></canvas></div>
  </main>
  <aside class="sidebar right"></aside>
</div>
<input type="file" id="fileInput" accept="image/*" style="display:none">
<style>
  .canvas { display: flex; align-items: center; justify-content: center; padding: 24px; background: #f4f4f4; }
  #outCanvas { max-width: 100%; max-height: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.15); border-radius: 8px; image-rendering: pixelated; }
  .ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .ex-tile { aspect-ratio: 1.4/1; border-radius: 8px; cursor: pointer; border: 1.5px solid transparent; overflow: hidden; transition: transform .15s; background: #f4f4f4 center/cover; position: relative; }
  .ex-tile:hover { transform: translateY(-2px); }
  .ex-tile.active { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink); }
  .ex-tile .ex-label { position: absolute; bottom: 4px; left: 6px; font-size: 9px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.5); font-weight: 500; }
</style>
<script src="/shared.js"></script>
<script>
// Use shared photo samples — see shared.js

// Bayer matrix (8x8)
const BAYER = [
  0, 32, 8, 40, 2, 34, 10, 42,
  48, 16, 56, 24, 50, 18, 58, 26,
  12, 44, 4, 36, 14, 46, 6, 38,
  60, 28, 52, 20, 62, 30, 54, 22,
  3, 35, 11, 43, 1, 33, 9, 41,
  51, 19, 59, 27, 49, 17, 57, 25,
  15, 47, 7, 39, 13, 45, 5, 37,
  63, 31, 55, 23, 61, 29, 53, 21,
].map(v => v/64);

const state = { sample: meshy.SAMPLE_PHOTOS[1].id, custom: null, loadedImage: null, mode: 'bayer', style: 'mono', size: 4, precision: 2, fg: '#000000', bg: '#ffffff' };

document.querySelector('.sidebar').innerHTML = `
  ${meshy.brandHtml('Dither')}
  <div class="scroll">
    <div class="sec">
      <div class="sec-title">Examples <span class="count">${meshy.SAMPLE_PHOTOS.length}</span></div>
      <div class="ex-grid" id="exGrid"></div>
    </div>
    <div class="sec">
      <div class="sec-title">Algorithm</div>
      <div class="chips" id="modeChips">
        <div class="chip active" data-m="bayer">Bayer</div>
        <div class="chip" data-m="floyd">Floyd–Steinberg</div>
        <div class="chip" data-m="atkinson">Atkinson</div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">Style</div>
      <div class="chips" id="styleChips">
        <div class="chip active" data-s="mono">1-bit</div>
        <div class="chip" data-s="duo">Duotone</div>
        <div class="chip" data-s="color">Color</div>
      </div>
    </div>
  </div>
  ${meshy.hintHtml()}
`;
document.querySelector('.sidebar.right').innerHTML = `
  <div class="brand"><div class="brand-name" style="font-size:18px">Controls</div></div>
  <div class="scroll">
    <div class="sec">
      <div class="row"><label>Pixel size</label><span class="val" id="sizeVal">4px</span></div>
      <input type="range" id="size" min="1" max="12" value="4">
      <div class="row" style="margin-top:14px"><label>Color levels</label><span class="val" id="precisionVal">2</span></div>
      <input type="range" id="precision" min="2" max="8" value="2">
    </div>
    <div class="sec">
      <div class="sec-title">Colors</div>
      <div class="row"><label>Dark</label></div>
      <input type="color" id="fg" value="#000000">
      <div class="row" style="margin-top:12px"><label>Light</label></div>
      <input type="color" id="bg" value="#ffffff">
    </div>
  </div>
`;

function renderExamples() {
  const wrap = document.getElementById('exGrid'); wrap.innerHTML = '';
  meshy.SAMPLE_PHOTOS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'ex-tile' + (s.id===state.sample&&!state.custom?' active':'');
    el.style.backgroundImage = `url("${s.url.replace('w=900','w=200')}")`;
    el.innerHTML = `<div class="ex-label">${s.name}</div>`;
    el.addEventListener('click', () => loadSampleById(s.id));
    wrap.appendChild(el);
  });
}
async function loadSampleById(id) {
  try {
    const img = await meshy.loadSample(id);
    state.sample = id; state.custom = null; state.loadedImage = img;
    renderExamples(); render();
  } catch (e) { meshy.toast('Failed to load sample'); }
}

function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

function render() {
  if (!state.loadedImage) return;
  const out = document.getElementById('outCanvas');
  const src = state.loadedImage;
  const srcW = src.naturalWidth, srcH = src.naturalHeight;
  const W = Math.floor(800/state.size), H = Math.round(W * (srcH/srcW));
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(src, 0, 0, W, H);
  const img = ctx.getImageData(0,0,W,H);
  const data = img.data;
  // Convert to grayscale for mono/duo
  const isMono = state.mode === 'bayer' && state.style !== 'color';
  if (state.mode === 'bayer') {
    const fg = hexToRgb(state.fg), bg = hexToRgb(state.bg);
    const levels = state.precision;
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const i = (y*W+x)*4;
      const t = BAYER[(y%8)*8 + (x%8)];
      for (let ch = 0; ch < 3; ch++) {
        const v = data[i+ch] / 255;
        const q = Math.round(v * (levels-1) + (t - 0.5)) / (levels-1);
        const clamped = Math.max(0, Math.min(1, q));
        if (state.style === 'mono') data[i+ch] = clamped > 0.5 ? bg[ch] : fg[ch];
        else if (state.style === 'duo') data[i+ch] = clamped > 0.5 ? bg[ch] : fg[ch];
        else data[i+ch] = Math.round(clamped * 255);
      }
    }
  } else {
    // Floyd-Steinberg or Atkinson error diffusion
    const matrix = state.mode === 'floyd'
      ? [[1,0,7/16],[-1,1,3/16],[0,1,5/16],[1,1,1/16]]
      : [[1,0,1/8],[2,0,1/8],[-1,1,1/8],[0,1,1/8],[1,1,1/8],[0,2,1/8]];
    const levels = state.precision;
    const fg = hexToRgb(state.fg), bg = hexToRgb(state.bg);
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const i = (y*W+x)*4;
      for (let ch = 0; ch < 3; ch++) {
        const old = data[i+ch];
        const q = Math.round((old/255) * (levels-1)) / (levels-1) * 255;
        const err = old - q;
        let nv;
        if (state.style === 'mono' || state.style === 'duo') nv = q > 127 ? bg[ch] : fg[ch];
        else nv = q;
        data[i+ch] = nv;
        for (const [dx,dy,w] of matrix) {
          const nx = x+dx, ny = y+dy;
          if (nx<0||nx>=W||ny>=H) continue;
          const ni = (ny*W+nx)*4 + ch;
          data[ni] = Math.max(0, Math.min(255, data[ni] + err*w));
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);
}

function bindRange(id,key,suffix='') {
  document.getElementById(id).addEventListener('input', e => {
    state[key] = +e.target.value;
    document.getElementById(id+'Val').textContent = state[key]+suffix;
    render();
  });
}
bindRange('size','size','px'); bindRange('precision','precision');
document.getElementById('fg').addEventListener('input', e => { state.fg = e.target.value; render(); });
document.getElementById('bg').addEventListener('input', e => { state.bg = e.target.value; render(); });
['modeChips','styleChips'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    const c = e.target.closest('.chip'); if (!c) return;
    document.querySelectorAll(`#${id} .chip`).forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    state[id === 'modeChips' ? 'mode' : 'style'] = c.dataset[id === 'modeChips' ? 'm' : 's'];
    render();
  });
});
document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) loadFile(f); });
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => { const img = new Image(); img.onload = () => { state.custom = ev.target.result; state.loadedImage = img; renderExamples(); render(); }; img.src = ev.target.result; };
  reader.readAsDataURL(file);
}
document.getElementById('exportBtn').addEventListener('click', () => {
  const out = document.getElementById('outCanvas');
  // Upscale for export
  const exp = document.createElement('canvas');
  exp.width = out.width * 4; exp.height = out.height * 4;
  const ec = exp.getContext('2d'); ec.imageSmoothingEnabled = false;
  ec.drawImage(out, 0, 0, exp.width, exp.height);
  const link = document.createElement('a'); link.download = 'dither-'+Date.now()+'.png'; link.href = exp.toDataURL('image/png'); link.click();
  meshy.toast('Exported');
});

renderExamples(); loadSampleById(state.sample);
</script>
</body>
</html>
