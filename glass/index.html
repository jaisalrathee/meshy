<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Glassmorphism · meshy.fun</title>
<meta name="description" content="Frosted glass card generator. Backdrop blur, tint, border. Live preview over mesh gradient." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script defer src="https://api.pirsch.io/pa.js" id="pianjs" data-code="JNW76zWZEUF0RzRyD9UTUx3sSGtYNuI5"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">Frosted glass.</div>
      <button class="btn primary" id="copyBtn">Copy CSS</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="glass-card" id="card">Glass Card</div>
    </div>
    <div class="canvas-bottom">
      <div class="output-wrap">
        <pre class="output" id="cssOut"></pre>
        <button class="copy-btn" id="copyBtn2">Copy</button>
      </div>
    </div>
  </main>

  <aside class="sidebar right"></aside>
</div>

<style>
  .canvas { display: flex; align-items: center; justify-content: center; }
  .glass-card {
    width: 340px; height: 220px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 600; font-size: 18px;
    text-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
</style>

<script src="/shared.js"></script>
<script>
const BG_PRESETS = {
  warm: ['#FFB199','#FF8FA3','#FFC8A2','#FFD6A5','#FF9A8B'],
  cool: ['#A1C4FD','#C2E9FB','#E0C3FC','#8EC5FC','#B5FFFC'],
  iris: ['#667EEA','#764BA2','#F093FB','#F5576C','#4FACFE'],
  dark: ['#0F2027','#203A43','#2C5364','#1F1C2C','#928DAB'],
  cyber: ['#FF0080','#7928CA','#FF4D4D','#F9CB28','#0070F3'],
  sunset: ['#FF6B6B','#FFA07A','#FFD56B','#FF8E72','#FF5E78'],
};
const stops = [[20,25],[75,30],[40,75],[80,80],[50,50]];

const state = { blur: 20, tint: 18, tintColor: '#ffffff', rad: 18, border: 30, sat: 180, bg: 'iris' };

document.querySelector('.sidebar').innerHTML = `
  ${meshy.brandHtml('Glass')}
  <div class="scroll">
    <div class="sec">
      <div class="sec-title">Background</div>
      <div class="thumb-grid" id="bgGrid"></div>
    </div>
    <div class="sec">
      <div class="sec-title">Preset Style</div>
      <div class="chips" id="styleChips">
        <div class="chip active" data-s="frosted">Frosted</div>
        <div class="chip" data-s="vivid">Vivid</div>
        <div class="chip" data-s="subtle">Subtle</div>
        <div class="chip" data-s="dark">Dark glass</div>
      </div>
    </div>
  </div>
  ${meshy.hintHtml()}
`;

document.querySelector('.sidebar.right').innerHTML = `
  <div class="brand"><div class="brand-name" style="font-size:18px">Controls</div></div>
  <div class="scroll">
    <div class="sec">
      <div class="row"><label>Blur</label><span class="val" id="blurVal">20px</span></div>
      <input type="range" id="blur" min="0" max="40" value="20">
      <div class="row" style="margin-top:14px"><label>Tint opacity</label><span class="val" id="tintVal">18%</span></div>
      <input type="range" id="tint" min="0" max="60" value="18">
      <div class="row" style="margin-top:14px"><label>Saturation</label><span class="val" id="satVal">180%</span></div>
      <input type="range" id="sat" min="100" max="300" value="180">
      <div class="row" style="margin-top:14px"><label>Radius</label><span class="val" id="radVal">18px</span></div>
      <input type="range" id="rad" min="0" max="40" value="18">
      <div class="row" style="margin-top:14px"><label>Border opacity</label><span class="val" id="borderVal">30%</span></div>
      <input type="range" id="border" min="0" max="100" value="30">
    </div>
    <div class="sec">
      <div class="sec-title">Tint Color</div>
      <input type="color" id="tintColor" value="#ffffff">
    </div>
  </div>
`;

function bgCss(key) {
  const c = BG_PRESETS[key];
  return c.map((col,i) => `radial-gradient(at ${stops[i][0]}% ${stops[i][1]}%, ${col} 0px, transparent 50%)`).join(', ') + `, ${c[0]}`;
}

function renderBgGrid() {
  const wrap = document.getElementById('bgGrid');
  wrap.innerHTML = '';
  Object.keys(BG_PRESETS).forEach(k => {
    const el = document.createElement('div');
    el.className = 'thumb-card' + (k === state.bg ? ' active' : '');
    el.style.background = bgCss(k);
    el.innerHTML = `<div class="name">${k.charAt(0).toUpperCase()+k.slice(1)}</div>`;
    el.addEventListener('click', () => { state.bg = k; renderBgGrid(); render(); });
    wrap.appendChild(el);
  });
}

function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

function render() {
  const canvas = document.getElementById('canvas');
  canvas.style.background = bgCss(state.bg);
  const card = document.getElementById('card');
  const [r,g,b] = hexToRgb(state.tintColor);
  const ta = state.tint/100, ba = state.border/100;
  card.style.cssText = `
    width:340px;height:220px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:600;font-size:18px;text-shadow:0 2px 12px rgba(0,0,0,.3);
    background:rgba(${r},${g},${b},${ta});
    backdrop-filter:blur(${state.blur}px) saturate(${state.sat}%);
    -webkit-backdrop-filter:blur(${state.blur}px) saturate(${state.sat}%);
    border:1px solid rgba(255,255,255,${ba});
    border-radius:${state.rad}px;
    box-shadow:0 8px 32px rgba(0,0,0,.18);
  `;
  card.textContent = 'Glass Card';
  document.getElementById('cssOut').textContent =
`background: rgba(${r}, ${g}, ${b}, ${ta.toFixed(2)});
backdrop-filter: blur(${state.blur}px) saturate(${state.sat}%);
-webkit-backdrop-filter: blur(${state.blur}px) saturate(${state.sat}%);
border: 1px solid rgba(255, 255, 255, ${ba.toFixed(2)});
border-radius: ${state.rad}px;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);`;
}

function bindRange(id, key, suffix='') {
  document.getElementById(id).addEventListener('input', e => {
    state[key] = +e.target.value;
    document.getElementById(id+'Val').textContent = state[key]+suffix;
    render();
  });
}
bindRange('blur','blur','px'); bindRange('tint','tint','%'); bindRange('sat','sat','%');
bindRange('rad','rad','px'); bindRange('border','border','%');

document.getElementById('tintColor').addEventListener('input', e => { state.tintColor = e.target.value; render(); });

document.getElementById('styleChips').addEventListener('click', e => {
  const c = e.target.closest('.chip');
  if (!c) return;
  document.querySelectorAll('#styleChips .chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  const presets = {
    frosted: { blur: 20, tint: 18, sat: 180, border: 30, tintColor: '#ffffff' },
    vivid: { blur: 30, tint: 12, sat: 250, border: 40, tintColor: '#ffffff' },
    subtle: { blur: 12, tint: 8, sat: 120, border: 18, tintColor: '#ffffff' },
    dark: { blur: 24, tint: 30, sat: 150, border: 20, tintColor: '#0a0a0a' },
  };
  Object.assign(state, presets[c.dataset.s]);
  ['blur','tint','sat','border'].forEach(k => {
    document.getElementById(k).value = state[k];
    const suf = k === 'blur' ? 'px' : '%';
    document.getElementById(k+'Val').textContent = state[k] + suf;
  });
  document.getElementById('tintColor').value = state.tintColor;
  render();
});

document.getElementById('copyBtn').addEventListener('click', () => meshy.copy(document.getElementById('cssOut').textContent, 'CSS copied'));
document.getElementById('copyBtn2').addEventListener('click', () => meshy.copy(document.getElementById('cssOut').textContent, 'CSS copied'));

renderBgGrid(); render();
</script>
</body>
</html>
