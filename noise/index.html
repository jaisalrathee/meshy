<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Noise & Pattern Generator · meshy.fun</title>
<meta name="description" content="SVG dot grids, lines, waves, grain. Copy CSS or download SVG." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script defer src="https://api.pirsch.io/pa.js" id="pianjs" data-code="JNW76zWZEUF0RzRyD9UTUx3sSGtYNuI5"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">Texture & pattern.</div>
      <button class="btn" id="svgBtn">Download SVG</button>
      <button class="btn primary" id="copyBtn">Copy CSS</button>
    </div>
    <div class="canvas" id="canvas"></div>
    <div class="canvas-bottom">
      <div class="output-wrap">
        <pre class="output" id="cssOut"></pre>
        <button class="copy-btn" id="copyBtn2">Copy</button>
      </div>
    </div>
  </main>

  <aside class="sidebar right"></aside>
</div>

<script src="/shared.js"></script>
<script>
const PATTERNS = [
  { id: 'dots', name: 'Dots' },
  { id: 'grid', name: 'Grid' },
  { id: 'lines-h', name: 'Lines' },
  { id: 'lines-d', name: 'Diagonal' },
  { id: 'cross', name: 'Crosses' },
  { id: 'chevron', name: 'Chevron' },
  { id: 'waves', name: 'Waves' },
  { id: 'triangles', name: 'Triangles' },
  { id: 'grain', name: 'Grain' },
];

const state = { pat: 'dots', size: 20, thick: 1, op: 100, fg: '#0a0a0a', bg: '#fafafa' };

document.querySelector('.sidebar').innerHTML = `
  ${meshy.brandHtml('Noise')}
  <div class="scroll">
    <div class="sec">
      <div class="sec-title">Pattern <span class="count">${PATTERNS.length}</span></div>
      <div class="thumb-grid three" id="patterns"></div>
    </div>
  </div>
  ${meshy.hintHtml()}
`;

document.querySelector('.sidebar.right').innerHTML = `
  <div class="brand"><div class="brand-name" style="font-size:18px">Controls</div></div>
  <div class="scroll">
    <div class="sec">
      <div class="row"><label>Size</label><span class="val" id="sizeVal">20</span></div>
      <input type="range" id="size" min="6" max="80" value="20">
      <div class="row" style="margin-top:14px"><label>Thickness</label><span class="val" id="thickVal">1</span></div>
      <input type="range" id="thick" min="0.5" max="6" step="0.5" value="1">
      <div class="row" style="margin-top:14px"><label>Opacity</label><span class="val" id="opVal">100%</span></div>
      <input type="range" id="op" min="10" max="100" value="100">
    </div>
    <div class="sec">
      <div class="sec-title">Colors</div>
      <div class="row"><label>Foreground</label></div>
      <input type="color" id="fg" value="#0a0a0a">
      <div class="row" style="margin-top:12px"><label>Background</label></div>
      <input type="color" id="bg" value="#fafafa">
    </div>
  </div>
`;

function buildSvg(forBg=true) {
  const s = state.size, t = state.thick, fg = state.fg;
  const bg = forBg ? '' : `<rect width="${s}" height="${s}" fill="${state.bg}"/>`;
  let body = '';
  switch (state.pat) {
    case 'dots': body = `<circle cx="${s/2}" cy="${s/2}" r="${t}" fill="${fg}"/>`; break;
    case 'grid': body = `<path d="M0 0 L${s} 0 M0 0 L0 ${s}" stroke="${fg}" stroke-width="${t}" fill="none"/>`; break;
    case 'lines-h': body = `<line x1="0" y1="${s/2}" x2="${s}" y2="${s/2}" stroke="${fg}" stroke-width="${t}"/>`; break;
    case 'lines-d': body = `<line x1="0" y1="${s}" x2="${s}" y2="0" stroke="${fg}" stroke-width="${t}"/>`; break;
    case 'cross': body = `<path d="M${s/2-3} ${s/2} h6 M${s/2} ${s/2-3} v6" stroke="${fg}" stroke-width="${t}" stroke-linecap="round"/>`; break;
    case 'chevron': body = `<path d="M0 ${s/2} L${s/2} 0 L${s} ${s/2}" stroke="${fg}" stroke-width="${t}" fill="none"/>`; break;
    case 'waves': body = `<path d="M0 ${s/2} Q${s/4} 0 ${s/2} ${s/2} T${s} ${s/2}" stroke="${fg}" stroke-width="${t}" fill="none"/>`; break;
    case 'triangles': body = `<polygon points="${s/2},${t} ${s-t},${s-t} ${t},${s-t}" fill="${fg}"/>`; break;
    case 'grain': {
      const r = parseInt(fg.slice(1,3),16)/255, g = parseInt(fg.slice(3,5),16)/255, b = parseInt(fg.slice(5,7),16)/255;
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${s*5}" height="${s*5}"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="${0.9 - state.size/200}" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 ${r}  0 0 0 0 ${g}  0 0 0 0 ${b}  0 0 0 ${state.op/100} 0"/></filter>${bg}<rect width="100%" height="100%" filter="url(#n)" opacity="${state.thick/4}"/></svg>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">${bg}<g opacity="${state.op/100}">${body}</g></svg>`;
}

function renderPatterns() {
  const wrap = document.getElementById('patterns');
  wrap.innerHTML = '';
  PATTERNS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'thumb-card' + (p.id === state.pat ? ' active' : '');
    const old = state.pat; state.pat = p.id;
    const svg = buildSvg(false);
    el.style.background = `${state.bg} url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
    el.style.backgroundSize = state.size + 'px';
    state.pat = old;
    el.innerHTML = `<div class="name" style="color:${state.fg};text-shadow:0 1px 2px rgba(255,255,255,.5)">${p.name}</div>`;
    el.addEventListener('click', () => { state.pat = p.id; renderPatterns(); render(); });
    wrap.appendChild(el);
  });
}

function render() {
  const svg = buildSvg();
  const canvas = document.getElementById('canvas');
  canvas.style.background = state.bg;
  canvas.style.backgroundImage = `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
  canvas.style.backgroundSize = (state.pat === 'grain' ? state.size*5 : state.size) + 'px';
  const css = `background-color: ${state.bg};\nbackground-image: url("data:image/svg+xml;utf8,${encodeURIComponent(svg).replace(/'/g,"%27").replace(/"/g,"%22")}");\nbackground-size: ${state.pat === 'grain' ? state.size*5 : state.size}px;`;
  document.getElementById('cssOut').textContent = css;
}

function bindRange(id, key, suffix='') {
  document.getElementById(id).addEventListener('input', e => {
    state[key] = +e.target.value;
    document.getElementById(id+'Val').textContent = state[key]+suffix;
    renderPatterns(); render();
  });
}
bindRange('size','size'); bindRange('thick','thick'); bindRange('op','op','%');

document.getElementById('fg').addEventListener('input', e => { state.fg = e.target.value; renderPatterns(); render(); });
document.getElementById('bg').addEventListener('input', e => { state.bg = e.target.value; renderPatterns(); render(); });

document.getElementById('copyBtn').addEventListener('click', () => meshy.copy(document.getElementById('cssOut').textContent, 'CSS copied'));
document.getElementById('copyBtn2').addEventListener('click', () => meshy.copy(document.getElementById('cssOut').textContent, 'CSS copied'));
document.getElementById('svgBtn').addEventListener('click', () => {
  const blob = new Blob([buildSvg()], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = `${state.pat}.svg`; link.href = URL.createObjectURL(blob); link.click();
});

renderPatterns(); render();
</script>
</body>
</html>
