<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Palette from Image · meshy.fun</title>
<meta name="description" content="Extract a color palette from any image. Export to CSS, Tailwind, JSON." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script defer src="https://api.pirsch.io/pa.js" id="pianjs" data-code="JNW76zWZEUF0RzRyD9UTUx3sSGtYNuI5"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">Borrow some colors.</div>
      <button class="btn" id="meshBtn">Open in Mesh →</button>
      <button class="btn primary" id="cssBtn">Copy CSS</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="dropzone" id="dropzone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div class="dropzone-text">Drop an image or <label><a>browse</a><input type="file" id="fileInput" accept="image/*" style="display:none"></label></div>
      </div>
      <img id="preview" style="display:none;width:100%;height:100%;object-fit:contain;padding:30px">
    </div>
    <div class="canvas-bottom">
      <div class="strip" id="swatches"></div>
    </div>
  </main>

  <aside class="sidebar right"></aside>
</div>

<style>
  .strip .sw {
    flex-shrink: 0; width: 88px; height: 88px;
    border-radius: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    position: relative;
    display: flex; align-items: flex-end;
    padding: 8px;
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
    color: #fff;
  }
</style>

<script src="/shared.js"></script>
<script>
let palette = [];
const state = { num: 5, image: null };

document.querySelector('.sidebar').innerHTML = `
  ${meshy.brandHtml('Palette')}
  <div class="scroll">
    <div class="sec">
      <div class="row"><label>Number of colors</label><span class="val" id="numVal">5</span></div>
      <input type="range" id="num" min="3" max="8" value="5">
    </div>
    <div class="sec">
      <div class="sec-title">Quick Examples</div>
      <div class="chips" id="examples">
        <div class="chip" data-ex="sunset">Sunset</div>
        <div class="chip" data-ex="forest">Forest</div>
        <div class="chip" data-ex="ocean">Ocean</div>
      </div>
    </div>
  </div>
  ${meshy.hintHtml('Drop image anywhere on canvas')}
`;

document.querySelector('.sidebar.right').innerHTML = `
  <div class="brand"><div class="brand-name" style="font-size:18px">Export</div></div>
  <div class="scroll">
    <div class="sec">
      <button class="btn full" id="cssCopy" style="margin-bottom:8px">Copy CSS variables</button>
      <button class="btn full" id="twCopy" style="margin-bottom:8px">Copy Tailwind config</button>
      <button class="btn full" id="jsonCopy" style="margin-bottom:8px">Copy JSON</button>
      <button class="btn full" id="hexCopy">Copy hex list</button>
    </div>
    <div class="sec">
      <div class="sec-title">Palette</div>
      <div id="hexes" style="font-family:'SF Mono',monospace;font-size:11px;color:var(--ink-2);line-height:1.8"></div>
    </div>
  </div>
`;

document.getElementById('num').addEventListener('input', e => {
  state.num = +e.target.value;
  document.getElementById('numVal').textContent = state.num;
  if (state.image) extract();
});

document.getElementById('dropzone').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => e.target.files[0] && loadImage(e.target.files[0]));
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => { state.image = ev.target.result; extract(); };
  reader.readAsDataURL(file);
}

function extract() {
  const img = new Image();
  img.onload = () => {
    document.getElementById('preview').src = state.image;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('dropzone').style.display = 'none';
    const W = 100, H = Math.round(100 * (img.height/img.width));
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, W, H);
    const data = ctx.getImageData(0,0,W,H).data;
    const buckets = new Map();
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      const key = `${r>>4},${g>>4},${b>>4}`;
      const v = buckets.get(key) || {r:0,g:0,b:0,n:0};
      v.r += r; v.g += g; v.b += b; v.n++;
      buckets.set(key, v);
    }
    const sorted = [...buckets.values()].sort((a,b) => b.n-a.n).slice(0, 20);
    palette = [];
    for (const b of sorted) {
      const r = Math.round(b.r/b.n), g = Math.round(b.g/b.n), bl = Math.round(b.b/b.n);
      const hex = '#' + [r,g,bl].map(x => x.toString(16).padStart(2,'0')).join('');
      if (palette.every(p => colorDist(p, hex) > 20)) palette.push(hex);
      if (palette.length >= state.num) break;
    }
    while (palette.length < state.num && sorted.length) {
      const b = sorted.shift();
      const r = Math.round(b.r/b.n), g = Math.round(b.g/b.n), bl = Math.round(b.b/b.n);
      palette.push('#' + [r,g,bl].map(x => x.toString(16).padStart(2,'0')).join(''));
    }
    renderSwatches();
  };
  img.src = state.image;
}

function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function colorDist(a,b) { const ar = hexToRgb(a), br = hexToRgb(b); return Math.sqrt((ar[0]-br[0])**2+(ar[1]-br[1])**2+(ar[2]-br[2])**2); }
function lum(rgb) { const a = rgb.map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}); return a[0]*0.2126+a[1]*0.7152+a[2]*0.0722; }

function renderSwatches() {
  const wrap = document.getElementById('swatches');
  wrap.innerHTML = '';
  palette.forEach(c => {
    const el = document.createElement('div');
    el.className = 'sw';
    el.style.background = c;
    if (lum(hexToRgb(c)) > 0.55) { el.style.color = '#0a0a0a'; el.style.textShadow = '0 1px 2px rgba(255,255,255,.5)'; }
    el.textContent = c.toUpperCase();
    el.addEventListener('click', () => meshy.copy(c, c.toUpperCase()+' copied'));
    wrap.appendChild(el);
  });
  document.getElementById('hexes').innerHTML = palette.map(c =>
    `<div style="display:flex;gap:8px;align-items:center"><span style="width:12px;height:12px;border-radius:3px;background:${c};border:1px solid rgba(0,0,0,.06)"></span>${c.toUpperCase()}</div>`
  ).join('');
}

document.getElementById('cssBtn').addEventListener('click', () => copyCss());
document.getElementById('cssCopy').addEventListener('click', () => copyCss());
function copyCss() {
  if (!palette.length) return meshy.toast('Drop an image first');
  meshy.copy(':root {\n' + palette.map((c,i) => `  --color-${i+1}: ${c};`).join('\n') + '\n}', 'CSS copied');
}
document.getElementById('twCopy').addEventListener('click', () => {
  if (!palette.length) return meshy.toast('Drop an image first');
  meshy.copy('colors: {\n  brand: {\n' + palette.map((c,i) => `    '${(i+1)*100}': '${c}',`).join('\n') + '\n  }\n}', 'Tailwind copied');
});
document.getElementById('jsonCopy').addEventListener('click', () => {
  if (!palette.length) return meshy.toast('Drop an image first');
  meshy.copy(JSON.stringify(palette, null, 2), 'JSON copied');
});
document.getElementById('hexCopy').addEventListener('click', () => {
  if (!palette.length) return meshy.toast('Drop an image first');
  meshy.copy(palette.join(', '), 'Hex list copied');
});
document.getElementById('meshBtn').addEventListener('click', () => {
  if (!palette.length) return meshy.toast('Drop an image first');
  const hash = btoa(unescape(encodeURIComponent(JSON.stringify({ c: palette }))));
  window.open('/mesh/#' + hash, '_blank');
});

const EXAMPLES = {
  sunset: ['#FF6B6B','#FFA07A','#FFD56B','#FF8E72','#FF5E78'],
  forest: ['#283C2A','#52796F','#84A98C','#CAD2C5','#354F52'],
  ocean: ['#0F2027','#203A43','#2C5364','#5B86E5','#36D1DC'],
};
document.getElementById('examples').addEventListener('click', e => {
  const c = e.target.closest('.chip');
  if (!c) return;
  palette = EXAMPLES[c.dataset.ex].slice(0, state.num);
  state.image = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('dropzone').style.display = 'flex';
  renderSwatches();
});
</script>
</body>
</html>
