<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contrast Checker · meshy.fun</title>
<meta name="description" content="WCAG contrast checker with live preview. Test text on background." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script defer src="https://api.pirsch.io/pa.js" id="pianjs" data-code="JNW76zWZEUF0RzRyD9UTUx3sSGtYNuI5"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="canvas-wrap">
    <div class="toolbar">
      <div class="title">Does it read?</div>
      <button class="btn" id="swapBtn">Swap colors</button>
      <button class="btn primary" id="randomBtn">Random pair</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="preview-pad">
        <div class="ratio-big" id="ratio">21:1</div>
        <div class="preview-text">
          <div class="huge">The quick brown fox</div>
          <p>Jumps over the lazy dog and discovers that contrast really matters for readability — especially at small sizes.</p>
          <div class="small">Small text · 13px · also needs to remain readable</div>
        </div>
      </div>
    </div>
  </main>

  <aside class="sidebar right"></aside>
</div>

<style>
  .canvas { display: flex; padding: 0; }
  .preview-pad { padding: 60px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .ratio-big { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 84px; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .preview-text .huge { font-size: 52px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 16px; }
  .preview-text p { font-size: 18px; line-height: 1.55; margin: 0 0 12px; max-width: 600px; }
  .preview-text .small { font-size: 13px; opacity: .85; }
  .grade-row { display: grid; grid-template-columns: 1fr auto; gap: 6px 12px; align-items: center; font-size: 13px; }
  .pill { padding: 3px 9px; border-radius: 6px; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .pill.pass { background: #d4f8d4; color: #064c06; }
  .pill.fail { background: #fde2e2; color: #8b1c1c; }
  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type=text] { flex: 1; font-family: 'SF Mono', monospace; font-size: 11.5px; padding: 7px 10px; }
  .color-row input[type=color] { width: 36px; flex-shrink: 0; }
</style>

<script src="/shared.js"></script>
<script>
const COMBOS = [
  ['#0a0a0a','#ffffff'], ['#ffffff','#0a0a0a'],
  ['#3b82f6','#ffffff'], ['#ffffff','#3b82f6'],
  ['#ec4899','#fff7ed'], ['#0a0a0a','#fef3c7'],
  ['#1e293b','#f1f5f9'], ['#5b86e5','#0f2027'],
];

const state = { fg: '#0a0a0a', bg: '#ffffff' };

document.querySelector('.sidebar').innerHTML = `
  ${meshy.brandHtml('Contrast')}
  <div class="scroll">
    <div class="sec">
      <div class="sec-title">Text color</div>
      <div class="color-row">
        <input type="color" id="fgPick" value="#0a0a0a">
        <input type="text" id="fgHex" value="#0a0a0a">
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">Background</div>
      <div class="color-row">
        <input type="color" id="bgPick" value="#ffffff">
        <input type="text" id="bgHex" value="#ffffff">
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">Common pairs</div>
      <div class="thumb-grid" id="combos"></div>
    </div>
  </div>
  ${meshy.hintHtml()}
`;

document.querySelector('.sidebar.right').innerHTML = `
  <div class="brand"><div class="brand-name" style="font-size:18px">WCAG Grades</div></div>
  <div class="scroll">
    <div class="sec">
      <div class="grade-row">
        <span><strong>AA</strong> Normal text<br/><span style="font-size:10px;color:var(--ink-3)">≥ 4.5:1</span></span>
        <span class="pill" id="aaNorm">PASS</span>
        <span><strong>AA</strong> Large text<br/><span style="font-size:10px;color:var(--ink-3)">≥ 3:1</span></span>
        <span class="pill" id="aaLarge">PASS</span>
        <span><strong>AAA</strong> Normal text<br/><span style="font-size:10px;color:var(--ink-3)">≥ 7:1</span></span>
        <span class="pill" id="aaaNorm">PASS</span>
        <span><strong>AAA</strong> Large text<br/><span style="font-size:10px;color:var(--ink-3)">≥ 4.5:1</span></span>
        <span class="pill" id="aaaLarge">PASS</span>
        <span><strong>UI</strong> Components<br/><span style="font-size:10px;color:var(--ink-3)">≥ 3:1</span></span>
        <span class="pill" id="ui">PASS</span>
      </div>
    </div>
  </div>
`;

function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lum(rgb) { const a = rgb.map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}); return a[0]*0.2126+a[1]*0.7152+a[2]*0.0722; }
function ratio(a, b) { const l1 = lum(hexToRgb(a)), l2 = lum(hexToRgb(b)); return ((Math.max(l1,l2)+0.05) / (Math.min(l1,l2)+0.05)); }

function render() {
  const r = ratio(state.fg, state.bg);
  document.getElementById('ratio').textContent = r.toFixed(2) + ':1';
  const grade = (id, t) => {
    const el = document.getElementById(id);
    const pass = r >= t;
    el.textContent = pass ? 'PASS' : 'FAIL';
    el.className = 'pill ' + (pass ? 'pass' : 'fail');
  };
  grade('aaNorm', 4.5); grade('aaLarge', 3); grade('aaaNorm', 7); grade('aaaLarge', 4.5); grade('ui', 3);
  const canvas = document.getElementById('canvas');
  canvas.style.background = state.bg;
  canvas.style.color = state.fg;
}

function renderCombos() {
  const wrap = document.getElementById('combos');
  wrap.innerHTML = '';
  COMBOS.forEach(([fg, bg]) => {
    const el = document.createElement('div');
    el.className = 'thumb-card';
    el.style.background = bg;
    el.style.color = fg;
    el.style.display = 'flex';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
    el.style.fontFamily = "'Instrument Serif', serif";
    el.style.fontStyle = 'italic';
    el.style.fontSize = '20px';
    el.innerHTML = 'Aa';
    el.addEventListener('click', () => {
      state.fg = fg; state.bg = bg;
      sync(); render();
    });
    wrap.appendChild(el);
  });
}

function sync() {
  document.getElementById('fgHex').value = state.fg;
  document.getElementById('fgPick').value = state.fg;
  document.getElementById('bgHex').value = state.bg;
  document.getElementById('bgPick').value = state.bg;
}

function bind(idHex, idPick, key) {
  document.getElementById(idHex).addEventListener('input', e => {
    let v = e.target.value.trim();
    if (!v.startsWith('#')) v = '#'+v;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      state[key] = v; document.getElementById(idPick).value = v; render();
    }
  });
  document.getElementById(idPick).addEventListener('input', e => {
    state[key] = e.target.value; document.getElementById(idHex).value = e.target.value; render();
  });
}
bind('fgHex','fgPick','fg'); bind('bgHex','bgPick','bg');

document.getElementById('swapBtn').addEventListener('click', () => {
  [state.fg, state.bg] = [state.bg, state.fg];
  sync(); render();
});
document.getElementById('randomBtn').addEventListener('click', () => {
  state.fg = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  state.bg = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  sync(); render();
});

renderCombos(); render();
</script>
</body>
</html>
